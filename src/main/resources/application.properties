spring.application.name=file-storage-system
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:change-me-bucket}
aws.s3.upload-url-ttl-seconds=${AWS_UPLOAD_URL_TTL_SECONDS:900}
aws.s3.download-url-ttl-seconds=${AWS_DOWNLOAD_URL_TTL_SECONDS:300}

# Optional: set via env vars or local secret config (never commit real values)
aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
